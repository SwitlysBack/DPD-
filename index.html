<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ParcelTrack</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 14px;
      width: 340px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    .logo {
      font-weight: bold;
      color: #dc2626;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 5px;
    }

    .sub {
      color: #666;
      font-size: 14px;
      margin-bottom: 15px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .hidden {
      display: none;
    }

    .info-box {
      background: #f9fafb;
      padding: 10px;
      border-radius: 8px;
      margin: 10px 0;
      font-size: 14px;
    }

    .status {
      color: #dc2626;
      font-weight: bold;
    }

    .success {
      color: green;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="logo">ParcelTrack</div>

  <!-- STEP 1 -->
  <div id="step1">
    <h2>Missed Delivery</h2>
    <p class="sub">Enter your parcel number to continue</p>

    <input id="tracking" type="text" placeholder="e.g. PT123456789">

    <button onclick="findParcel()">Find my parcel</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="hidden">
    <h2>Delivery Update</h2>

    <div class="info-box">
      <p><strong>Tracking:</strong> PT123456789</p>
      <p><strong>Status:</strong> <span class="status">Delivery Attempt Failed</span></p>
      <p><strong>Date:</strong> 3 April 2026</p>
      <p><strong>Time:</strong> 14:32</p>
      <p><strong>Reason:</strong> No answer at address</p>
    </div>

    <label>Choose a new delivery option:</label>
    <select id="option">
      <option>Reschedule delivery</option>
      <option>Deliver to neighbour</option>
      <option>Leave in safe place</option>
      <option>Deliver to pickup shop</option>
    </select>

    <input type="date" id="date">

    <button onclick="confirm()">Confirm changes</button>
  </div>

  <!-- STEP 3 -->
  <div id="step3" class="hidden">
    <h2>Update Confirmed</h2>

    <p class="success">Your delivery has been successfully updated.</p>

    <div class="info-box">
      <p id="summary"></p>
      <p><strong>Reference:</strong> PT-RES-83921</p>
    </div>
  </div>

</div>

<script>
  function findParcel() {
    const tracking = document.getElementById("tracking").value;

    if (tracking.length < 5) {
      alert("Please enter a valid tracking number");
      return;
    }

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
  }

  function confirm() {
    const option = document.getElementById("option").value;
    const date = document.getElementById("date").value;

    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.remove("hidden");

    document.getElementById("summary").innerText =
      `New option: ${option} | Selected date: ${date}`;
  }
</script>

</body>
</html>
