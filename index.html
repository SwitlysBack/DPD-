<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Missed Delivery</title>
  <style>
    body {
      font-family: Arial;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: black;
      color: white;
      border: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Missed Delivery</h2>
    <p>Enter your parcel number</p>
    <input type="text" placeholder="Parcel number">
    <button onclick="showMessage()">Find my parcel</button>
    <p id="result"></p>
  </div>

  <script>
    function showMessage() {
      document.getElementById("result").innerText =
        "We missed you. Please choose a new delivery date.";
    }
  </script>
</body>
</html>
